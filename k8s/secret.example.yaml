# 範例 Secret，請自行用 sealed-secrets 或 vault 替換
# 產生方式：
#   HMAC_SALT=$(openssl rand -hex 32)
#   ENCRYPTION_KEY=$(openssl rand -base64 32)
#   kubectl create secret generic cirda-secrets \
#     --from-literal=hmac-salt=$HMAC_SALT \
#     --from-literal=encryption-key=$ENCRYPTION_KEY
apiVersion: v1
kind: Secret
metadata:
  name: cirda-secrets
type: Opaque
stringData:
  hmac-salt: REPLACE_ME_RANDOM_32_BYTES
  encryption-key: REPLACE_ME_BASE64_32_BYTES
