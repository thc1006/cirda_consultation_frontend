apiVersion: apps/v1
kind: Deployment
metadata:
  name: cirda-frontend
  labels:
    app: cirda-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cirda-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cirda-frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: cirda-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: file:/data/local.db
            - name: HMAC_SALT
              valueFrom:
                secretKeyRef:
                  name: cirda-secrets
                  key: hmac-salt
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cirda-secrets
                  key: encryption-key
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cirda-data
